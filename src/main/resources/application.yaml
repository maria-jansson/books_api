spring:
  application:
    name: booksapi
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never